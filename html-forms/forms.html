<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Demo</title>
</head>
<body>
    <h1>Forms Demo</h1>

    <form action="https://www.reddit.com/search/">

        <p>
            <label for="username">Enter a Username:</label>
            <input type="text" id="username" placeholder="username" name="username">
        </p>
        <p>
            <label for="password">Enter a Password:</label>
            <input type="password" name="password" placeholder="password" id="password">
        </p>

        <button>Submit</button>
    </form>
    <br>
    <br>
    <form action="https://www.reddit.com/search" target="_blank">
        <input type="text" name="q" placeholder="Search Reddit">
        <button>Search</button>
    </form>

    <br>

    <br>
    <form action="https://www.google.com/search" target="_blank">
        <input type="text" name="q" placeholder="Search Google">
        <button>Search</button>
    </form>

    <br>

    <br>
    <form action="https://www.youtube.com/results" target="_blank">
        <input type="text" name="search_query" placeholder="Search Youtube">
        <button>Search</button>
    </form>

    <h2>More Inputs</h2>
    <form action="/birds">
        <input type="checkbox" name="agree" id="agree" checked>
        <label for="agree">I agree to the terms and conditions.</label>

        <p>
            <label for="M">Medium:</label>
            <input type="radio" name="size" id="M" value="m">
            <label for="L">Large:</label>
            <input type="radio" name="size" id="L" value="l">
            <label for="XL">Extra Large:</label>
            <input type="radio" name="size" id="XL" value="xl">
        </p>

        <p>
            <label for="">Please select a meal type: </label>
            <select name="meal" id="meal">
                <option value="">--Please choose an option--</option>
                <option value="chicken">Chicken</option>
                <option value="beef">Beef</option>
                <option value="mutton">Mutton</option>
            </select>

            <p>
                <label for="volume">Volune: </label>
                <input type="range" id="volume" name="volume" min="0" max="100">
            </p>
        </p>
        <button>Submit</button>
    </form>
    
</body>
</html>
