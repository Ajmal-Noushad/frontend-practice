<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online SHop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <nav>
                <div class="title" style="margin-right: auto;">Online Shop</div>
                <a class="nav-link" href="#">Shoes</a>
                <a class="nav-link" href="#">About</a>
                <a class="nav-link" href="#">Login</a>
            </nav>
        </div>
    </header>
    <div class="product-list">

        <div class="product">
            <img height="300px" src="images/men1.png" alt="Product 1">
            <p>Duramo SL 2.0</p>
            <span>$56.00</span>
        </div>

        <div class="product">
            <img height="300px" src="images/men2.png" alt="Product 2">
            <p>Air Force 1 07</p>
            <span>$119.00</span>
        </div>

        <div class="product">
            <img height="300px" src="images/men3.png" alt="Product 3">
            <p>Nike SL </p>
            <span>$43.00</span>
        </div>

        <div class="product">
            <img height="300px" src="images/men4.png" alt="Product 4">
            <p>Puma XA 2.0</p>
            <span>$26.00</span>
        </div>

        <div class="product">
            <img height="300px" src="images/men5.png" alt="Product 5">
            <p>Puma Universal</p>
            <span>$128.00</span>
        </div>

        <div class="product">
            <img height="300px" src="images/men7.png" alt="Product 6">
            <p>Asics Ranger</p>
            <span>$97.00</span>
        </div>

    </div>
</body>
</html>
