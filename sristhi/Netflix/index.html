<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="flex-container">
        <div id="logo" style="margin-right: auto">
            <img src="logo.png" height="60px">
        </div>
        
        <div id="language">
            <label for="Language"></label>
            <select name="Language" id="Language" style="background-color: rgba(0,0,0,0.5); color: white">
                <option value="en" selected>English</option>
                <option value="mal">Malayalam</option>
                <option value="tamil">Tamil</option>
            </select>
        </div>

        <div id="button">
            <button class="sign">Sign In</button>
        </div>
        
    </div>

    <div class=main>
        <h1>Unlimited movies, TV shows, and more</h1>
        <p>Watch anywhere. Cancel anytime</p>
        <p>Ready to watch? Enter your email to create or restart your membership.</p>
        <div>
            <input class="email" type="email" placeholder="Email address" style="background-color: rgba(0,0,0,0.5); color: white">
            <button class="start">Get Started></button>
        </div>
    </div>
</body>
</html>
