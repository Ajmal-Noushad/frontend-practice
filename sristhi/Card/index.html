<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Product Cards</h1>

    <div class="flex-container">
        <div class="product-details" style="grid-area: first-car">
            <img src="images/car-1.png" alt="1" height="128px">
            <p>Dodge Viper</p>
            <span>2014</span>
        </div>
        <div class="product-details" style="grid-area: second;">
            <img src="images/car-2.png" alt="2" height="128px">
            <p>Yellow Car</p>
            <span>2001</span>
        </div>
        <div class="product-details" style="grid-area: kk;">
            <img src="images/car-3.png" alt="3" height="128px">
            <p>Koeinseg</p>
            <span>2019</span>
        </div>
        <div class="product-details" name="ford" style="grid-area: ford;">
            <img src="images/car-4.png" alt="4" height="128px">
            <p>Ford</p>
            <span>2005</span>
        </div>
        <div class="product-details" style="grid-area: viper;">
            <img src="images/car-1.png" alt="1" height="128px">
            <p>Dodge Viper</p>
            <span>2014</span>
        </div>
        <div class="product-details" style="grid-area: new;">
            <img src="images/car-3.png" alt="3" height="128px">
            <p>Koeinseg</p>
            <span>2019</span>
        </div>
    </div>
</body>
</html>
